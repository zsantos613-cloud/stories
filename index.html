<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dinosaur Database</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #05070d;
    color: white;
    font-family: 'Orbitron', sans-serif;
}

/* Cards */
.dino-card {
    background: rgba(15, 22, 36, 0.8);
    border: 1px solid #1f2a3a;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
    height: 140px;

    display: flex;
    flex-direction: column;
    justify-content: center;
}

.dino-card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(0,150,255,0.4);
}

/* Icons */
.dino-card img {
    width: 70px;
    height: 70px;
    object-fit: contain;
}

/* Filters */
.filter-btn {
    margin: 5px;
}

</style>
</head>

<body>

<div class="container py-5">

<h2 class="text-center mb-4">DINOSAUR DATABASE</h2>

<!-- 🔍 Search -->
<input type="text" id="search" class="form-control mb-3" placeholder="Search...">

<!-- 🎛 Filters -->
<div class="text-center mb-4">
    <button class="btn btn-outline-light filter-btn" onclick="filterType('all')">All</button>
    <button class="btn btn-outline-danger filter-btn" onclick="filterType('carnivore')">Carnivore</button>
    <button class="btn btn-outline-success filter-btn" onclick="filterType('herbivore')">Herbivore</button>
    <button class="btn btn-outline-info filter-btn" onclick="filterType('piscivore')">Piscivore</button>
    <button class="btn btn-outline-info filter-btn" onclick="filterType('aquatic')">Aquatic</button>
    
</div>

<!-- Grid -->
<div id="dino-grid" class="row g-4"></div>

</div>

<script src="./assets/js/main.js"></script>

</body>
</html>
